# AgentPress 生产环境部署配置
# 使用 GitHub Container Registry 发布的镜像
# 用法: docker compose -f deploy-compose.yml --env-file .env.production up -d

services:
  app:
    image: ghcr.io/qmzz/agentpress:latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://agentpress:${POSTGRES_PASSWORD}@db:5432/agentpress
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      DATABASE_IDLE_TIMEOUT_SECONDS: ${DATABASE_IDLE_TIMEOUT_SECONDS:-30}
      DATABASE_CONNECT_TIMEOUT_SECONDS: ${DATABASE_CONNECT_TIMEOUT_SECONDS:-3}
      ADMIN_SECRET: ${ADMIN_SECRET}
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-http://localhost:3000}
      REDIS_URL: ${REDIS_URL:-}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      BACKUP_DIR: ${BACKUP_DIR:-/app/uploads/backups}
      BACKUP_LOCAL_RETENTION_DAYS: ${BACKUP_LOCAL_RETENTION_DAYS:-14}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-database-backups}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-auto}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      BACKUP_S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
      BACKUP_S3_FORCE_PATH_STYLE: ${BACKUP_S3_FORCE_PATH_STYLE:-false}
      API_LOG_RETENTION_DAYS: ${API_LOG_RETENTION_DAYS:-30}
      API_LOG_PRUNE_MODE: ${API_LOG_PRUNE_MODE:-delete}
      AI_L2_REVIEW_ENABLED: ${AI_L2_REVIEW_ENABLED:-false}
      AI_L2_BASE_URL: ${AI_L2_BASE_URL:-https://api.openai.com/v1}
      AI_L2_API_KEY: ${AI_L2_API_KEY:-}
      AI_L2_MODEL: ${AI_L2_MODEL:-gpt-4o-mini}
      AI_L2_TIMEOUT_MS: ${AI_L2_TIMEOUT_MS:-15000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JOB_POLL_INTERVAL_MS: ${JOB_POLL_INTERVAL_MS:-5000}
      JOB_MAX_ITERATIONS: ${JOB_MAX_ITERATIONS:-0}
      JOB_RETENTION_DAYS: ${JOB_RETENTION_DAYS:-7}
      ANALYTICS_HASH_SALT: ${ANALYTICS_HASH_SALT:-agentpress}
      MAX_COMMENT_LENGTH: ${MAX_COMMENT_LENGTH:-5000}
      REACTION_TYPES: ${REACTION_TYPES:-like,love,insightful,bookmark}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentpress
      POSTGRES_USER: agentpress
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentpress"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
